<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EdTech Hub | Student Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50 text-slate-800 font-['Plus_Jakarta_Sans']">

    <div class="flex min-h-screen">
        <aside class="fixed inset-y-0 left-0 z-50 w-64 bg-[#1e3a8a] text-white flex flex-col shadow-2xl transition-transform lg:translate-x-0 -translate-x-full">
            <div class="p-8 border-b border-white/10 flex items-center gap-3">
                <i data-lucide="graduation-cap" class="text-blue-400 w-8 h-8"></i>
                <span class="font-extrabold text-xl tracking-tighter uppercase">EdTech Hub</span>
            </div>
            
            <div class="px-6 py-10 flex flex-col items-center text-center">
                <div class="relative mb-4">
                    <img src="https://ui-avatars.com/api/?name=An+Nguyen&background=3b82f6&color=fff" class="w-20 h-20 rounded-3xl border-4 border-white/10 shadow-xl">
                    <span class="absolute -bottom-1 -right-1 w-5 h-5 bg-green-500 border-4 border-[#1e3a8a] rounded-full"></span>
                </div>
                <p class="font-bold text-base">Nguyễn Văn An</p>
                <p class="text-[10px] text-blue-300 uppercase font-bold tracking-widest mt-1">Lớp 12A1 • Student</p>
            </div>

            <nav class="mt-2 px-4 flex flex-col gap-2">
                <button class="nav-btn active" data-page="dashboard"><i data-lucide="layout-grid"></i><span>Tóm tắt học tập</span></button>
                <button class="nav-btn" data-page="courses"><i data-lucide="book-open"></i><span>Khóa học của tôi</span></button>
                <button class="nav-btn" data-page="progress"><i data-lucide="bar-chart-big"></i><span>Tiến độ & Điểm số</span></button>
            </nav>
        </aside>

        <div class="flex-1 lg:ml-64 flex flex-col h-screen overflow-y-auto">
            <header class="h-20 bg-white/80 backdrop-blur-xl border-b sticky top-0 z-40 px-8 flex items-center justify-between">
                <button id="mobile-toggle" class="lg:hidden p-2"><i data-lucide="menu"></i></button>
                <div class="flex items-center gap-5 ml-auto">
                    <button id="notif-btn" class="p-3 hover:bg-slate-100 rounded-2xl transition relative">
                        <i data-lucide="bell" class="w-5 h-5 text-slate-500"></i>
                        <span class="absolute top-3 right-3 w-2 h-2 bg-red-500 rounded-full border-2 border-white"></span>
                    </button>
                    <div id="notif-panel" class="hidden absolute right-8 top-20 w-80 bg-white rounded-[2rem] shadow-2xl border border-slate-100 z-50 overflow-hidden animate-fade-in">
                        <div class="p-5 bg-slate-50 border-b font-bold text-[10px] uppercase tracking-widest text-slate-400">Thông báo mới</div>
                        <div id="notif-list" class="max-h-60 overflow-y-auto p-2"></div>
                    </div>
                </div>
            </header>
            <main id="main-view" class="p-8 lg:p-12 animate-fade-in"></main>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="main.js"></script>
</body>
</html>
