<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Phụ Huynh Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="mobile-overlay" id="mobile-overlay" onclick="toggleMobileMenu()"></div>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-brand">
            <div class="brand-logo">
                <div class="logo-circle">P</div>
                <div><div class="brand-name">PHỤ HUYNH</div><div class="brand-sub">Parent Portal v3.0 Pro</div></div>
            </div>
        </div>

        <div class="student-switcher">
            <div class="switcher-label">Học sinh</div>
            <div id="student-list-sidebar"></div>
        </div>

        <div class="sidebar-nav">
            <div class="nav-label">Tổng quan</div>
            <div class="nav-item active" data-page="dashboard" onclick="navigate('dashboard',this)">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
                <span class="nav-label-text">Dashboard</span>
            </div>

            <div class="nav-label">Học tập</div>
            <div class="nav-item" data-page="students" onclick="navigate('students',this)">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                <span class="nav-label-text">Quản lý con</span>
            </div>
            <div class="nav-item" data-page="progress" onclick="navigate('progress',this)">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
                <span class="nav-label-text">Kết quả học tập</span>
            </div>
            <div class="nav-item" data-page="courses" onclick="navigate('courses',this)">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
                <span class="nav-label-text">Khóa học</span>
            </div>
            <div class="nav-item" data-page="schedule" onclick="navigate('schedule',this)">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                <span class="nav-label-text">Thời khóa biểu</span>
            </div>

            <div class="nav-label">Tài chính & Liên lạc</div>
            <div class="nav-item" data-page="finance" onclick="navigate('finance',this)">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
                <span class="nav-label-text">Tài chính</span>
            </div>
            <div class="nav-item" data-page="chat" onclick="navigate('chat',this)">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                <span class="nav-label-text">Liên hệ Zalo</span>
            </div>
        </div>
    </aside>

    <div class="main">
        <div class="topbar">
            <div class="topbar-left">
                <button class="hamburger" onclick="toggleMobileMenu()">☰</button>
                <div>
                    <div class="page-title" id="page-title">Đang tải...</div>
                    <div class="page-sub" id="page-sub">Vui lòng chờ</div>
                </div>
            </div>
            <div class="topbar-right">
                <div class="search-box">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#9aa0b0" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    <input placeholder="Tìm kiếm..."/>
                </div>
                <div class="notif-btn" onclick="toggleNotif()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#5a6072" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
                    <div class="notif-dot" id="notif-dot" style="display:none"></div>
                </div>
            </div>
        </div>

        <div class="notif-panel" id="notif-panel">
            <div style="padding:14px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;">
                <strong style="font-size:14px;">Thông báo</strong>
            </div>
            <div id="notif-list"></div>
        </div>

        <div class="content" id="content"></div>
    </div>

    <div class="modal-overlay" id="modal-student">
        <div class="modal">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
                <h3 style="font-size:18px; font-weight:700;">Thêm học sinh mới</h3>
                <button class="btn" onclick="closeModal('modal-student')" style="background:transparent; border:none; font-size:18px; cursor:pointer;">✕</button>
            </div>
            <form id="addStudentForm" onsubmit="submitAddStudent(event)">
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:16px;">
                    <div><label style="font-size:12px; font-weight:600; display:block; margin-bottom:6px;">Họ và tên</label><input id="inp-name" style="width:100%; padding:10px; border-radius:8px; border:1px solid var(--border); outline:none;" required placeholder="Nguyễn Văn A"/></div>
                    <div><label style="font-size:12px; font-weight:600; display:block; margin-bottom:6px;">Ngày sinh</label><input id="inp-dob" style="width:100%; padding:10px; border-radius:8px; border:1px solid var(--border); outline:none;" required type="date"/></div>
                </div>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:20px;">
                    <div><label style="font-size:12px; font-weight:600; display:block; margin-bottom:6px;">Lớp</label><input id="inp-class" style="width:100%; padding:10px; border-radius:8px; border:1px solid var(--border); outline:none;" required placeholder="5A"/></div>
                    <div><label style="font-size:12px; font-weight:600; display:block; margin-bottom:6px;">Trường</label><input id="inp-school" style="width:100%; padding:10px; border-radius:8px; border:1px solid var(--border); outline:none;" required placeholder="THCS Nguyễn Du"/></div>
                </div>
                <div style="display:flex; justify-content:flex-end; gap:12px;">
                    <button type="button" class="btn" style="background:#f1f5f9; border:none; padding:10px 20px; border-radius:8px; cursor:pointer; font-weight:600;" onclick="closeModal('modal-student')">Hủy</button>
                    <button type="submit" class="btn" id="btn-submit-student" style="background:var(--accent); color:#fff; border:none; padding:10px 20px; border-radius:8px; cursor:pointer; font-weight:600;">Lưu học sinh</button>
                </div>
            </form>
        </div>
    </div>

    <div id="toast-container"></div>

    <script src="script.js"></script>
</body>
</html>
