<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Học Sinh Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css"> 
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-brand">
            <div class="brand-logo">
                <div class="logo-circle">S</div>
                <div>
                    <div class="brand-name">HỌC SINH</div>
                    <div class="brand-sub">Student Portal v3.0</div>
                </div>
            </div>
        </div>

        <div class="sidebar-nav">
            <div class="nav-label">Tổng quan</div>
            <button class="nav-item active" data-page="dashboard"><i data-lucide="layout-grid" class="nav-icon"></i><span class="nav-label-text">Dashboard</span></button>
            
            <div class="nav-label">Học tập</div>
            <button class="nav-item" data-page="courses"><i data-lucide="book-open" class="nav-icon"></i><span class="nav-label-text">Khóa học của tôi</span></button>
            <button class="nav-item" data-page="assignments"><i data-lucide="clipboard-list" class="nav-icon"></i><span class="nav-label-text">Bài tập của tôi</span></button>
            <button class="nav-item" data-page="progress"><i data-lucide="bar-chart-2" class="nav-icon"></i><span class="nav-label-text">Kết quả & Điểm số</span></button>
        </div>

        <div class="sidebar-bottom">
            <div class="user-block" style="display: flex; align-items: center; gap: 10px; width: 100%;">
                <div class="user-avatar" id="user-avatar">A</div>
                <div style="flex: 1;">
                    <div class="user-name" id="user-name">Đang tải...</div>
                    <div class="user-role" id="user-role">Học sinh</div>
                </div>
                <button class="logout-btn" onclick="handleLogout()" title="Đăng xuất">
                    <i data-lucide="log-out"></i>
                </button>
            </div>
        </div>
    </aside>

    <div class="main">
        <div class="topbar">
            <div class="topbar-left">
                <div>
                    <div class="page-title" id="page-title">Dashboard</div>
                    <div class="page-sub" id="page-sub">Chào mừng trở lại!</div>
                </div>
            </div>
            <div class="topbar-right">
                <button class="btn btn-ghost" onclick="document.getElementById('join-modal').classList.add('active')">
                    <i data-lucide="plus-square" style="width:16px;"></i> Tham gia khóa học
                </button>
                <div class="notif-btn" id="notif-btn">
                    <i data-lucide="bell" style="width: 18px; height: 18px; color: var(--text2);"></i>
                    <div class="notif-dot"></div>
                </div>
            </div>
        </div>

        <div class="notif-panel" id="notif-panel">
            <div style="padding:14px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;">
                <strong style="font-size:14px;">Thông báo</strong>
            </div>
            <div id="notif-list"></div>
        </div>

        <div class="content" id="content"></div>
    </div>

    <div class="modal-overlay" id="join-modal">
        <div class="modal-content">
            <h3 style="font-size:18px; font-weight:700; color:var(--text); margin-bottom:8px; text-align:center;">Tham gia khóa học</h3>
            <p style="font-size:12px; color:var(--text2); text-align:center; margin-bottom:20px;">Nhập mã khóa học mà giáo viên đã chia sẻ với bạn.</p>
            <input type="text" id="join-course-code" placeholder="VD: TOAN11..." style="width:100%; padding:12px 16px; border:1px solid var(--border); border-radius:10px; margin-bottom:20px; outline:none; font-family:inherit; text-transform: uppercase;">
            <div style="display:flex; gap:12px; justify-content:flex-end;">
                <button class="btn btn-ghost" onclick="closeJoinModal()">Hủy</button>
                <button class="btn btn-primary" onclick="joinCourse()">Thêm</button>
            </div>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="main.js"></script>
</body>
</html>
